<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>かいものメモ｜LiLy</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #080b14;
    color: #e2e8f0;
    font-family: 'Hiragino Sans', 'Noto Sans JP', 'Yu Gothic', sans-serif;
    min-height: 100vh;
    padding-bottom: 80px;
  }

  /* Header */
  .header {
    background: linear-gradient(160deg, #0f172a 0%, #0f1f3d 100%);
    border-bottom: 1px solid #1e293b;
    padding: 22px 20px 18px;
    position: sticky; top: 0; z-index: 10;
  }
  .header-inner { max-width: 500px; margin: 0 auto; }
  .header h1 {
    font-size: 21px; font-weight: 800; letter-spacing: -0.5px;
    background: linear-gradient(90deg, #818cf8, #38bdf8);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    display: inline-block; flex: 1;
  }
  .header-row { display: flex; align-items: center; gap: 10px; margin-bottom: 3px; }
  .header p { font-size: 11px; color: #475569; }
  .btn-torisetsu {
    background: none; border: 1px solid #334155;
    border-radius: 8px; padding: 4px 8px;
    color: #64748b; font-size: 12px; cursor: pointer;
    font-family: inherit; text-decoration: none;
    display: flex; align-items: center; gap: 4px;
    flex-shrink: 0; transition: all 0.2s;
  }
  .btn-torisetsu:hover { border-color: #818cf8; color: #818cf8; }
  .btn-shokai {
    background: none; border: 1px solid #334155;
    border-radius: 8px; padding: 4px 8px;
    color: #64748b; font-size: 12px; cursor: pointer;
    font-family: inherit; text-decoration: none;
    display: flex; align-items: center; gap: 4px;
    flex-shrink: 0; transition: all 0.2s;
  }
  .btn-shokai:hover { border-color: #f59e0b; color: #f59e0b; }

  /* Main */
  .main { max-width: 500px; margin: 0 auto; padding: 18px 14px 0; }

  /* Input card */
  .input-card {
    background: #0f172a; border: 1px solid #1e293b;
    border-radius: 16px; padding: 14px; margin-bottom: 14px;
  }
  .input-row { display: flex; gap: 8px; margin-bottom: 10px; }
  .input-row input {
    flex: 1; background: #1e293b; border: 1px solid #334155;
    border-radius: 10px; padding: 11px 13px; color: #e2e8f0;
    font-size: 15px; outline: none; transition: border-color 0.2s;
    font-family: inherit;
  }
  .input-row input:focus { border-color: #6366f1; }
  .input-row input::placeholder { color: #475569; }
  .btn-add {
    background: linear-gradient(135deg, #6366f1, #818cf8);
    border: none; border-radius: 10px; width: 46px; height: 46px;
    font-size: 24px; cursor: pointer; color: #fff;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; transition: opacity 0.2s; line-height: 1;
  }
  .btn-add:hover { opacity: 0.85; }
  .btn-sort {
    width: 100%; background: linear-gradient(135deg, #059669, #0d9488);
    border: none; border-radius: 10px; padding: 11px;
    color: #fff; font-size: 14px; font-weight: 700;
    cursor: pointer; display: flex; align-items: center;
    justify-content: center; gap: 8px; transition: opacity 0.2s;
    font-family: inherit;
  }
  .btn-sort:hover { opacity: 0.9; }
  .btn-sort:disabled { background: #1e293b; color: #475569; cursor: not-allowed; opacity: 1; }

  /* Stats */
  .stats-row {
    display: flex; justify-content: space-between; align-items: center;
    padding: 4px 2px; margin-bottom: 8px;
  }
  .stats-left { display: flex; align-items: center; gap: 8px; }
  .stats-count { font-size: 12px; color: #64748b; }
  .btn-small {
    background: none; border: 1px solid #1e293b;
    border-radius: 6px; padding: 2px 8px; color: #64748b;
    font-size: 11px; cursor: pointer; font-family: inherit;
    transition: color 0.15s;
  }
  .btn-small:hover { color: #94a3b8; }

  /* Progress */
  .progress-bar {
    height: 3px; background: #1e293b; border-radius: 99px;
    margin-bottom: 14px; overflow: hidden;
  }
  .progress-fill {
    height: 100%; border-radius: 99px;
    background: linear-gradient(90deg, #6366f1, #38bdf8);
    transition: width 0.4s ease;
  }

  /* Category group */
  .cat-group {
    border-radius: 14px; margin-bottom: 10px; overflow: hidden;
    animation: fadeIn 0.3s ease;
    transition: opacity 0.4s;
  }
  .cat-header {
    padding: 9px 13px; display: flex; align-items: center; gap: 7px;
  }
  .cat-name { font-size: 12px; font-weight: 700; }
  .cat-count {
    margin-left: auto; font-size: 10px;
    border-radius: 20px; padding: 1px 7px;
  }

  /* Flat list container */
  .flat-list {
    background: #0f172a; border: 1px solid #1e293b;
    border-radius: 14px; overflow: hidden;
  }

  /* Item row */
  .item-row {
    display: flex; align-items: center;
    padding: 11px 13px; gap: 11px;
    border-bottom: 1px solid #ffffff06;
    cursor: pointer; transition: background 0.15s;
  }
  .item-row:last-child { border-bottom: none; }
  .item-row:hover { background: rgba(255,255,255,0.04); }
  .item-check {
    width: 21px; height: 21px; border-radius: 50%; flex-shrink: 0;
    border: 2px solid #334155; background: transparent;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.2s; font-size: 11px; font-weight: 700; color: #fff;
  }
  .item-info { flex: 1; min-width: 0; }
  .item-name {
    font-size: 15px; color: #e2e8f0;
    transition: all 0.2s; display: block;
  }
  .item-name.checked { color: #334155; text-decoration: line-through; }
  .item-last {
    font-size: 10px; color: #475569; margin-top: 2px;
    display: block;
  }
  .item-last.recent { color: #f87171; }
  .btn-del {
    background: none; border: none; color: #334155;
    font-size: 18px; cursor: pointer; padding: 2px 6px;
    line-height: 1; border-radius: 6px; transition: color 0.15s;
    font-family: inherit;
  }
  .btn-del:hover { color: #ef4444; }

  /* Quantity stepper */
  .qty-ctrl {
    display: flex; align-items: center; gap: 5px; flex-shrink: 0;
  }
  .qty-btn {
    width: 26px; height: 26px; border-radius: 50%;
    border: 1px solid #334155; background: #1e293b;
    color: #94a3b8; font-size: 16px; line-height: 1;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    transition: all 0.15s; flex-shrink: 0; font-family: inherit;
  }
  .qty-btn:hover { background: #334155; color: #e2e8f0; }
  .qty-num {
    font-size: 14px; font-weight: 700; color: #e2e8f0;
    min-width: 18px; text-align: center;
  }
  .qty-num.gt1 { color: #818cf8; }

  /* Empty state */
  .empty {
    text-align: center; padding: 52px 20px;
  }
  .empty .emoji { font-size: 52px; margin-bottom: 12px; }
  .empty p { font-size: 14px; color: #334155; }
  .empty small { font-size: 11px; color: #1e293b; margin-top: 8px; display: block; }

  /* Spinner */
  .spinner {
    width: 14px; height: 14px;
    border: 2px solid #334155; border-top-color: #6366f1;
    border-radius: 50%; animation: spin 0.7s linear infinite;
    display: inline-block; flex-shrink: 0;
  }

  @keyframes spin { to { transform: rotate(360deg); } }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(6px); }
    to { opacity: 1; transform: translateY(0); }
  }
</style>
</head>

  ["調味料・乾物", ["醤油","しょうゆ","みそ","味噌","塩","砂糖","酢","みりん","酒","料理酒","だし","ダシ","鶏がらスープ","コンソメ","ケチャップ","マヨネーズ","ドレッシング","ソース","ポン酢","ごま油","オリーブオイル","サラダ油","ラー油","わさび","からし","七味","胡椒","コショウ","スパイス","カレー粉","カレールー","海苔","のり","わかめ","昆布","かつおぶし","削り節","ごま","白ごま","黒ごま","ふりかけ","味の素","ほんだし","缶詰","トマト缶","コーン缶","豆缶","調味料","乾物"]],
];

// ========== Storage ==========
function saveHistory(h) {
  try { localStorage.setItem('kaimono_history', JSON.stringify(h)); } catch(e) {}
}
function loadHistory() {
  try {
    const raw = localStorage.getItem('kaimono_history');
    return raw ? JSON.parse(raw) : {};
  } catch(e) { return {}; }
}
function saveItems(arr) {
  try { localStorage.setItem('kaimono_items', JSON.stringify(arr)); } catch(e) {}
}
function loadItems() {
  try {
    const raw = localStorage.getItem('kaimono_items');
    return raw ? JSON.parse(raw) : [];
  } catch(e) { return []; }
}

// ========== State ==========
let items = loadItems();
let sorted = false;
let animating = false;
let history = loadHistory();

// ========== Utils ==========
function guessCategory(name) {
  const lower = name.toLowerCase();
  for (const [cat, keywords] of KEYWORD_MAP) {
    if (keywords.some(k => lower.includes(k.toLowerCase()))) return cat;
  }
  return "日用品・その他";
}

function normalizeKey(name) {
  return name.trim();
}

function formatLastBought(dateStr) {
  if (!dateStr) return null;
  const diff = Math.floor((Date.now() - new Date(dateStr)) / 86400000);
  if (diff === 0) return { text: "今日買った", recent: true };
  if (diff === 1) return { text: "昨日買った", recent: true };
  if (diff < 7)  return { text: `${diff}日前に購入`, recent: true };
  if (diff < 30) return { text: `${Math.floor(diff/7)}週間前に購入`, recent: false };
  if (diff < 365) return { text: `${Math.floor(diff/30)}ヶ月前に購入`, recent: false };
  return { text: "1年以上前に購入", recent: false };
}

// ========== Actions ==========
function addItems() {
  const val = document.getElementById('itemInput').value;
  const names = val.split(/[,、\n]/).map(s => s.trim()).filter(Boolean);
  if (!names.length) return;
  names.forEach(name => {
    items.push({ id: Date.now() + Math.random(), name, qty: 1, checked: false, category: null });
  });
  document.getElementById('itemInput').value = '';
  sorted = false;
  saveItems(items);
  render();
  document.getElementById('itemInput').focus();
}

function sortByCategory() {
  if (animating) return;
  animating = true;
  const btn = document.getElementById('sortBtn');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span> 並べ替え中…';
  setTimeout(() => {
    items = items.map(item => ({ ...item, category: guessCategory(item.name) }));
    sorted = true;
    animating = false;
    btn.disabled = false;
    render();
  }, 400);
}

function changeQty(id, delta) {
  const item = items.find(i => i.id === id);
  if (!item) return;
  item.qty = Math.max(1, (item.qty || 1) + delta);
  saveItems(items);
  render();
}

function toggleItem(id) {
  const item = items.find(i => i.id === id);
  if (!item) return;
  item.checked = !item.checked;
  // チェックON → 購入履歴に記録
  if (item.checked) {
    history[normalizeKey(item.name)] = new Date().toISOString();
    saveHistory(history);
  }
  saveItems(items);
  render();
}

function removeItem(id) {
  items = items.filter(i => i.id !== id);
  saveItems(items);
  render();
}

function clearChecked() {
  items = items.filter(i => !i.checked);
  saveItems(items);
  render();
}

function clearAll() {
  items = [];
  sorted = false;
  saveItems(items);
  render();
}

// ========== Render ==========
function render() {
  const total = items.length;
  const checked = items.filter(i => i.checked).length;

  // Sort button visibility
  document.getElementById('sortBtn').style.display = total > 0 ? 'flex' : 'none';
  if (!animating) {
    document.getElementById('sortBtn').innerHTML = '✨ コーナー別に並べ替え';
  }

  // Stats
  const statsArea = document.getElementById('statsArea');
  statsArea.style.display = total > 0 ? 'block' : 'none';
  document.getElementById('statsText').textContent = `${checked}/${total} 完了`;
  document.getElementById('clearCheckedBtn').style.display = checked > 0 ? 'inline-block' : 'none';
  document.getElementById('progressFill').style.width = total ? `${(checked/total)*100}%` : '0%';

  // List
  const listArea = document.getElementById('listArea');
  if (total === 0) {
    listArea.innerHTML = `
      <div class="flat-list">
        <div class="empty">
          <div class="emoji">🛒</div>
          <p>商品を追加してみよう</p>
          <small>きゅうり、豚バラ、牛乳、パン…</small>
        </div>
      </div>`;
    return;
  }

  if (sorted) {
    // カテゴリ別表示
    let html = '';
    for (const [cat, cfg] of Object.entries(CATEGORY_CONFIG)) {
      const catItems = items.filter(i => i.category === cat);
      if (!catItems.length) continue;
      const allChecked = catItems.every(i => i.checked);
      html += `
        <div class="cat-group" style="background:${cfg.bg}; border:1px solid ${cfg.color}28; opacity:${allChecked ? 0.45 : 1}">
          <div class="cat-header" style="border-bottom:1px solid ${cfg.color}18">
            <span style="font-size:16px">${cfg.emoji}</span>
            <span class="cat-name" style="color:${cfg.color}">${cat}</span>
            <span class="cat-count" style="color:${cfg.color}; background:${cfg.color}20">${catItems.length}点</span>
          </div>
          ${catItems.map(item => renderItemRow(item, cfg.color)).join('')}
        </div>`;
    }
    listArea.innerHTML = html;
  } else {
    // フラット表示
    listArea.innerHTML = `
      <div class="flat-list">
        ${items.map(item => renderItemRow(item, '#6366f1')).join('')}
      </div>`;
  }
}

function renderItemRow(item, color) {
  const lastInfo = formatLastBought(history[normalizeKey(item.name)]);
  const qty = item.qty || 1;
  const checkStyle = item.checked
    ? `border-color:${color}; background:${color}`
    : `border-color:#334155; background:transparent`;
  return `
    <div class="item-row" onclick="toggleItem(${item.id})">
      <div class="item-check" style="${checkStyle}">
        ${item.checked ? '✓' : ''}
      </div>
      <div class="item-info">
        <span class="item-name ${item.checked ? 'checked' : ''}">${escHtml(item.name)}</span>
        ${lastInfo ? `<span class="item-last ${lastInfo.recent ? 'recent' : ''}">📅 ${lastInfo.text}</span>` : ''}
      </div>
      <div class="qty-ctrl" onclick="event.stopPropagation()">
        <button class="qty-btn" onclick="changeQty(${item.id}, -1)">－</button>
        <span class="qty-num ${qty > 1 ? 'gt1' : ''}">${qty}</span>
        <button class="qty-btn" onclick="changeQty(${item.id}, 1)">＋</button>
      </div>
      <button class="btn-del" onclick="event.stopPropagation(); removeItem(${item.id})">×</button>
    </div>`;
}

function escHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// Enter key
document.getElementById('itemInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') addItems();
});

// Initial render
render();
</script>
</body>
</html>
